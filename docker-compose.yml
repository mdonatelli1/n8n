services:
    postgres:
        image: postgres:17.4
        restart: unless-stopped
        environment:
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
        volumes:
            - ./postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
            interval: 5s
            timeout: 5s
            retries: 10

    n8n:
        image: n8nio/n8n:stable
        restart: unless-stopped
        environment:
            # Base de données
            - DB_TYPE=postgresdb
            - DB_POSTGRESDB_HOST=postgres
            - DB_POSTGRESDB_USER=${POSTGRES_USER}
            - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
            - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}

            # Sécurité & gestion utilisateurs
            - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
            - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_USER_MANAGEMENT_JWT_SECRET}

            # Configuration n8n
            - WEBHOOK_URL=${WEBHOOK_URL}
            - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
            - N8N_SKIP_AUTH_ON_OAUTH_CALLBACK=false

            # Proxy (pour Cloudflare Tunnel)
            - N8N_PROXY_HOPS=1

            # Options diverses
            - N8N_DIAGNOSTICS_ENABLED=false
            - N8N_PERSONALIZATION_ENABLED=false

            # Task Runners (OBLIGATOIRE v2.0)
            - N8N_RUNNERS_ENABLED=true
            - N8N_RUNNERS_MODE=external
            - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
            - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
        volumes:
            - ./.n8n:/home/node/.n8n
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 10

    n8n-runner-js:
        image: n8nio/runners:stable
        restart: unless-stopped
        environment:
            - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
            - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
        depends_on:
            n8n:
                condition: service_healthy

    cloudflared:
        image: cloudflare/cloudflared:latest
        restart: unless-stopped
        command: tunnel --url http://n8n:5678
        depends_on:
            n8n:
                condition: service_healthy

    scraper:
        image: mcr.microsoft.com/playwright:v1.60.0-noble
        restart: unless-stopped
        working_dir: /usr/src/app
        volumes:
            - ./playwright-scraper:/usr/src/app
        command: sh -c "npm install --omit=dev && node server.js"
        env_file:
            - ./playwright-scraper/.env

    qdrant:
        image: qdrant/qdrant:latest
        restart: unless-stopped
        volumes:
            - ./qdrant_storage:/qdrant/storage

    ollama:
        image: ollama/ollama:latest
        restart: unless-stopped
        volumes:
            - ./.ollama:/root/.ollama
        deploy:
            resources:
                limits:
                    memory: 6G
